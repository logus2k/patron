<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patron</title>
    <link rel="stylesheet" href="vendor/litegraph/litegraph.css" />
    <link rel="stylesheet" href="vendor/jspanel/jspanel.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/menubar.css" />
    <!-- Default theme before paint (light). The active theme persists as workspace
         metadata on the server (Save/Load), not in localStorage. -->
    <script>
      document.documentElement.dataset.theme = "light";
    </script>
  </head>
  <body>
    <header id="topbar">
      <span class="brand">P</span>
      <!-- pull-down menu bar (replaces the old toolbar buttons); rendered by
           MenuBar from the model in js/menu.js, wired to commands in app.js -->
      <div id="menubar"></div>
    </header>

    <!-- the canvas fills the whole screen; the topbar + Toolbox/Output panels float over it -->
    <main id="canvas-wrap">
      <canvas id="graph-canvas" tabindex="1"></canvas>
    </main>

    <!-- BUILD STAMP: bump the text each deploy so you can confirm your tab loaded the new build. -->
    <div id="patron-build" style="position:fixed;bottom:4px;right:8px;font:11px ui-monospace,monospace;opacity:.5;z-index:99999;pointer-events:none">build&nbsp;07-02·D · dblclick-clean</div>

    <!-- vendored libraries -->
    <script src="vendor/litegraph/litegraph.js"></script>
    <!-- Patron's litegraph customizations as prototype overrides (keeps the vendored
         litegraph.js byte-pristine / drop-in updatable — see js/litegraph-patches.js) -->
    <script src="js/litegraph-patches.js"></script>
    <!-- edge resize cursors + width-resize + crosshair fix (must load before app.js) -->
    <script src="js/node-resize.js"></script>
    <!-- per-block filled/colored SVG icons (title box + toolbox); load before app.js -->
    <script src="js/block-icons.js"></script>
    <!-- inline widget editing (overrides litegraph's detached prompt) -->
    <script src="js/inline-edit.js"></script>
    <script src="vendor/jspanel/jspanel.min.js"></script>
    <!-- GoF pattern nodes (conceptual inspiration) -->
    <script src="js/patterns.js"></script>
    <!-- composer authoring vocabulary (node types == agent_runtime composer blocks) -->
    <script src="js/agent_nodes.js"></script>
    <!-- pull-down menu bar (vendored from noted) + its data model -->
    <script src="js/MenuBar.js"></script>
    <script src="js/menu.js"></script>
    <!-- app bootstrap + wiring -->
    <script src="js/app.js"></script>
    <!-- Properties panel (edits the selected node's fields in an HTML form) -->
    <script src="js/props-panel.js"></script>
    <!-- generic Resource Manager panel (lists any declared resource from /resources/catalog) -->
    <script src="js/resource-manager.js"></script>
    <!-- highlights the active (last-clicked) panel's title bar -->
    <script src="js/panel-active.js"></script>
    <!-- Patron-owned link context menu (replaces litegraph's collapsed native one) -->
    <script src="js/link-menu.js"></script>
  </body>
</html>
