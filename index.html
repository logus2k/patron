<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patron</title>
    <link rel="stylesheet" href="vendor/litegraph/litegraph.css" />
    <link rel="stylesheet" href="vendor/jspanel/jspanel.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/menubar.css" />
    <!-- Default theme before paint (light). The active theme persists as workspace
         metadata on the server (Save/Load), not in localStorage. -->
    <script>
      document.documentElement.dataset.theme = "light";
    </script>
  </head>
  <body>
    <header id="topbar">
      <span class="brand">P</span>
      <!-- pull-down menu bar (replaces the old toolbar buttons); rendered by
           MenuBar from the model in js/menu.js, wired to commands in app.js -->
      <div id="menubar"></div>
    </header>

    <!-- the canvas fills the whole screen; the topbar + Toolbox/Output panels float over it -->
    <main id="canvas-wrap">
      <canvas id="graph-canvas" tabindex="1"></canvas>
    </main>

    <!-- vendored libraries -->
    <script src="vendor/litegraph/litegraph.js"></script>
    <script src="vendor/jspanel/jspanel.min.js"></script>
    <!-- GoF pattern nodes (conceptual inspiration) -->
    <script src="js/patterns.js"></script>
    <!-- runtime-aligned agent nodes (the real authoring vocabulary) -->
    <script src="js/agent_nodes.js"></script>
    <!-- draft compiler: graph -> runtime DSL (provisional, re-pointed when the DSL hardens) -->
    <script src="js/compile.js"></script>
    <!-- pull-down menu bar (vendored from noted) + its data model -->
    <script src="js/MenuBar.js"></script>
    <script src="js/menu.js"></script>
    <!-- app bootstrap + wiring -->
    <script src="js/app.js"></script>
  </body>
</html>
