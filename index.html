<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patron — Agentic Pattern Composer</title>
    <link rel="stylesheet" href="vendor/litegraph/litegraph.css" />
    <link rel="stylesheet" href="vendor/jspanel/jspanel.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- Default theme before paint (light). The active theme persists as workspace
         metadata on the server (Save/Load), not in localStorage. -->
    <script>
      document.documentElement.dataset.theme = "light";
    </script>
  </head>
  <body>
    <header id="topbar">
      <span class="brand">Patron</span>
      <div class="actions">
        <button id="btn-news" title="Load the News Agent (runtime-aligned nodes)">🗞 News Agent</button>
        <button id="btn-compile" title="Lower the current graph to the runtime DSL (draft)">⚙ Compile → DSL</button>
        <button id="btn-save" title="Save the current graph to this browser">💾 Save</button>
        <button id="btn-load" title="Load the saved graph">📂 Load</button>
        <span class="sep"></span>
        <button id="btn-run" title="Run one execution pass (GoF demo)">▶ Run</button>
        <button id="btn-reset" title="Reload the GoF demo composition">↺ Demo</button>
        <button id="btn-clear" title="Empty the canvas">✕ Clear</button>
        <span class="sep"></span>
        <button id="btn-output" title="Show/hide the Output panel">📄 Output</button>
        <button id="btn-theme" title="Toggle light/dark theme">🌙 dark</button>
      </div>
    </header>

    <!-- the canvas fills the whole screen; the topbar + Toolbox/Output panels float over it -->
    <main id="canvas-wrap">
      <canvas id="graph-canvas" tabindex="1"></canvas>
    </main>

    <!-- vendored libraries -->
    <script src="vendor/litegraph/litegraph.js"></script>
    <script src="vendor/jspanel/jspanel.min.js"></script>
    <!-- GoF pattern nodes (conceptual inspiration) -->
    <script src="js/patterns.js"></script>
    <!-- runtime-aligned agent nodes (the real authoring vocabulary) -->
    <script src="js/agent_nodes.js"></script>
    <!-- draft compiler: graph -> runtime DSL (provisional, re-pointed when the DSL hardens) -->
    <script src="js/compile.js"></script>
    <!-- app bootstrap + wiring -->
    <script src="js/app.js"></script>
  </body>
</html>
